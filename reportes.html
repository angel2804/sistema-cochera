<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COCHERA POS — Reportes</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="sidebar-overlay no-print" id="sidebar-overlay" onclick="cerrarSidebar()"></div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar no-print" id="sidebar">
    <div class="sidebar-logo">
      <h2>🏎️ COCHERA POS</h2>
      <span>Panel de Administración</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <a class="nav-item" href="dashboard.html"><span>🏠</span> Dashboard</a>
      <a class="nav-item" href="dashboard.html"><span>🚗</span> Registrar Auto</a>
      <a class="nav-item" href="cochera.html"><span>🅿️</span> En Cochera</a>
      <a class="nav-item" href="dashboard.html"><span>📋</span> Historial</a>
      <a class="nav-item" href="dashboard.html"><span>📊</span> Estadísticas</a>
      <div class="nav-section">Administración</div>
      <a class="nav-item" href="dashboard.html"><span>👥</span> Usuarios</a>
      <a class="nav-item" href="clientes.html"><span>👤</span> Clientes</a>
      <div class="nav-item active"><span>📋</span> Reportes</div>
      <a class="nav-item" href="horarios.html"><span>📅</span> Horarios</a>
      <a class="nav-item" href="pre-registro.html"><span>📦</span> Pre-registro</a>
      <a class="nav-item" href="dashboard.html"><span>⚙️</span> Configuración</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar">👑</div>
        <div>
          <div class="sidebar-user-name" id="sidebar-nombre">Admin</div>
          <div class="sidebar-user-role">Administrador</div>
        </div>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">🚪 Cerrar Sesión</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="topbar no-print">
      <div class="topbar-left">
        <button class="btn-icon-sm" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title">📋 REPORTES</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-time" id="reloj">--:--:--</span>
        <button class="btn-icon-sm" id="btn-modo" title="Modo oscuro/claro"></button>
      </div>
    </div>

    <div class="content-area no-print">

      <!-- Filtros -->
      <div class="reportes-filtros">
        <select id="filtro-trabajador" class="form-input"
          style="max-width:220px" onchange="aplicarFiltros()">
          <option value="">Todos los trabajadores</option>
        </select>
        <select id="filtro-estado" class="form-input"
          style="max-width:180px" onchange="aplicarFiltros()">
          <option value="">Todos los estados</option>
          <option value="activo">🟢 Activos</option>
          <option value="cerrado">⚫ Cerrados</option>
        </select>
        <button class="btn btn-secondary" onclick="cargarTurnos()">🔄 Actualizar</button>
      </div>

      <!-- Lista de turnos -->
      <div id="lista-turnos">
        <p style="color:var(--text3)">Cargando reportes...</p>
      </div>

    </div>

    <!-- Área de impresión (oculta normalmente) -->
    <div id="print-area" style="display:none"></div>

  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="firebase/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/turnos.js"></script>
<script src="js/reportes.js"></script>
<script src="js/pages/reportes-app.js"></script>
</body>
</html>
